app:
  env: "release"
  server_id: 1

api_server:
  port: 8080

ws_server:
  port: 8081
  rpc_port: 9091
  # 通过环境变量 GOIM_WS_SERVER_INTERNAL_API_KEY 覆盖
  internal_api_key: ""
  # 生产环境应配置具体域名，如 ["https://example.com"]
  allowed_origins: []

mysql:
  # 通过环境变量 GOIM_MYSQL_DSN 覆盖
  dsn: "root:changeme@tcp(mysql:3306)/go_im?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 20

redis:
  addr: "redis:6379"
  password: ""
  db: 0

kafka:
  brokers: ["kafka:19092"]
  topic_chat: "chat_messages"
  consumer_group: "im_push_group"

jwt:
  # 通过环境变量 GOIM_JWT_SECRET 覆盖
  secret: "changeme"
  access_expire_hours: 24
  refresh_expire_hours: 168

log:
  level: "info"
  filename: "./logs/go-im.log"
