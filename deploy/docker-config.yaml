app:
  env: "release"
  server_id: 1

api_server:
  port: 8080
  # 生产环境应配置具体域名
  allowed_origins: []

ws_server:
  port: 8081
  rpc_port: 9091
  # Push 服务向 WS 网关推送消息时使用的地址（Docker 容器间通信）
  rpc_advertise_addr: "im-ws:9091"
  # 通过环境变量 GOIM_WS_SERVER_INTERNAL_API_KEY 覆盖
  internal_api_key: ""
  # 生产环境应配置具体域名，如 ["https://example.com"]
  allowed_origins: []

mysql:
  # 通过环境变量 GOIM_MYSQL_DSN 覆盖
  dsn: "root:changeme@tcp(mysql:3306)/go_im?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_life_sec: 300   # 连接最大生命周期（秒），5 分钟
  conn_max_idle_sec: 180   # 空闲连接最大存活时间（秒），3 分钟

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 0             # 0 表示使用 go-redis 默认值（10 * NumCPU）
  min_idle_conns: 10
  dial_timeout_ms: 5000    # 拨号超时 5 秒
  read_timeout_ms: 3000    # 读超时 3 秒
  write_timeout_ms: 3000   # 写超时 3 秒

kafka:
  brokers: ["kafka:19092"]
  topic_chat: "chat_messages"
  consumer_group: "im_push_group"
  max_wait_ms: 3000          # FetchMessage 最大等待时间
  max_bytes: 10485760        # 单次 Fetch 最大字节数（10MB）
  start_offset: -1           # -1=newest, -2=oldest

push:
  push_timeout_ms: 3000             # 内部 HTTP 推送超时
  group_member_cache_ttl_sec: 3600  # 群成员缓存 TTL（1 小时）
  group_push_concurrency: 20        # 群推送最大并发度

jwt:
  # 必须通过环境变量 GOIM_JWT_SECRET 设置，否则服务启动时校验将拒绝启动
  secret: ""
  access_expire_hours: 24
  refresh_expire_hours: 168

log:
  level: "info"
  filename: "./logs/go-im.log"
  max_size: 100        # 单个日志文件最大大小（MB）
  max_backups: 10      # 保留旧日志文件数量（生产环境保留更多）
  max_age: 30          # 保留旧日志文件天数
