app:
  env: "debug"               # debug | release
  server_id: 1               # 用于 Snowflake ID 生成

api_server:
  port: 8080
  # CORS 允许的来源列表，空列表表示允许所有来源（开发模式）
  allowed_origins: []

ws_server:
  port: 8081
  rpc_port: 9091             # 用于接收内部 push 请求的 HTTP/RPC 端口
  # 生产环境请通过环境变量 GOIM_WS_SERVER_INTERNAL_API_KEY 覆盖
  internal_api_key: ""
  # WebSocket 允许的来源列表，空列表表示允许所有来源（开发模式）
  allowed_origins: []

mysql:
  # 生产环境请通过环境变量 GOIM_MYSQL_DSN 覆盖
  dsn: "root:changeme@tcp(localhost:3306)/go_im?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_life_sec: 300   # 连接最大生命周期（秒），5 分钟
  conn_max_idle_sec: 180   # 空闲连接最大存活时间（秒），3 分钟

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 0             # 0 表示使用 go-redis 默认值（10 * NumCPU）
  min_idle_conns: 5
  dial_timeout_ms: 5000    # 拨号超时 5 秒
  read_timeout_ms: 3000    # 读超时 3 秒
  write_timeout_ms: 3000   # 写超时 3 秒

kafka:
  brokers: ["localhost:9092"]
  topic_chat: "chat_messages"
  consumer_group: "im_push_group"

jwt:
  # 生产环境请通过环境变量 GOIM_JWT_SECRET 覆盖，不要使用默认值
  secret: "changeme"
  access_expire_hours: 24
  refresh_expire_hours: 168

log:
  level: "debug"
  filename: "./logs/go-im.log"
